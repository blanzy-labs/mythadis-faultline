services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
